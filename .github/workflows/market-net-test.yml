name: market-net-test
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: Probe tbh-market reachability from the runner
        run: |
          echo "default UA:"
          curl -s -o /dev/null -w "  http=%{http_code}\n" "https://tbh-market.com/api/items?page=1&pageSize=5" || true
          echo "browser UA + accept headers:"
          curl -s -o /dev/null -w "  http=%{http_code}\n" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: application/json,text/plain,*/*" \
            -H "Accept-Language: en-US,en;q=0.9" \
            "https://tbh-market.com/api/items?page=1&pageSize=5" || true
          echo "steam (control — known reachable):"
          curl -s -o /dev/null -w "  http=%{http_code}\n" "https://steamcommunity.com/market/search/render/?appid=3678970&norender=1&count=1&start=0" || true
